name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.4"
          - "8.5"

    steps:
      - name: Checkout server
        uses: actions/checkout@v7
        with:
          path: server

      - name: Checkout runtime
        uses: actions/checkout@v7
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Checkout client
        uses: actions/checkout@v7
        with:
          repository: php-skir/client
          path: client

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer configuration
        run: composer validate --strict
        working-directory: server

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress
        working-directory: server

      - name: Run tests
        run: composer test
        working-directory: server

  boost-assets:
    name: Laravel Boost assets (${{ matrix.scenario }})
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        scenario:
          - server
          - both

    steps:
      - name: Checkout server
        uses: actions/checkout@v7
        with:
          path: server

      - name: Checkout runtime
        uses: actions/checkout@v7
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Checkout client
        uses: actions/checkout@v7
        with:
          repository: php-skir/client
          path: client

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Validate Composer archive assets
        if: matrix.scenario == 'server'
        working-directory: server
        run: |
          composer archive --format=zip --dir=build/archive
          unzip -Z1 build/archive/*.zip > build/archive-files.txt
          for asset in \
            resources/boost/guidelines/core.blade.php \
            resources/boost/skills/skir-server-development/SKILL.md \
            resources/boost/skills/skir-server-development/references/procedures-and-routing.md \
            resources/boost/skills/skir-server-development/references/scaffolding.md \
            resources/boost/skills/skir-server-development/references/structures-and-validation.md \
            resources/boost/skills/skir-server-development/references/studio-codecs-and-testing.md
          do
            grep -Fxq "$asset" build/archive-files.txt
          done

      - name: Create Laravel 13 consumer
        run: composer create-project laravel/laravel:^13.0 "boost-${{ matrix.scenario }}" --prefer-dist --no-interaction --no-progress

      - name: Install copied Skir packages and Boost
        working-directory: boost-${{ matrix.scenario }}
        run: |
          composer config minimum-stability dev
          composer config prefer-stable true
          composer config repositories.runtime '{"type":"path","url":"../runtime","options":{"symlink":false}}' --json
          composer config repositories.client '{"type":"path","url":"../client","options":{"symlink":false}}' --json
          composer config repositories.server '{"type":"path","url":"../server","options":{"symlink":false}}' --json
          if [ "${{ matrix.scenario }}" = 'both' ]
          then
            composer require php-skir/server:dev-main php-skir/client:dev-main --no-interaction --no-progress
          else
            composer require php-skir/server:dev-main --no-interaction --no-progress
          fi
          composer require laravel/boost:^2.4 --dev --no-interaction --no-progress
          test ! -L vendor/php-skir/server
          if [ "${{ matrix.scenario }}" = 'both' ]
          then
            test ! -L vendor/php-skir/client
          fi

      - name: Install and verify server assistance
        working-directory: boost-${{ matrix.scenario }}
        run: |
          if [ "${{ matrix.scenario }}" = 'both' ]
          then
            php -r 'file_put_contents("boost.json", json_encode(["agents" => ["codex"], "guidelines" => true, "mcp" => false, "packages" => ["php-skir/client", "php-skir/server"], "skills" => ["skir-client-development", "skir-server-development"]], JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES).PHP_EOL);'
          else
            php -r 'file_put_contents("boost.json", json_encode(["agents" => ["codex"], "guidelines" => true, "mcp" => false, "packages" => ["php-skir/server"], "skills" => ["skir-server-development"]], JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES).PHP_EOL);'
          fi
          php artisan boost:update --no-interaction
          grep -Fq 'php-skir/server' AGENTS.md
          test -f .agents/skills/skir-server-development/SKILL.md
          test -f .agents/skills/skir-server-development/references/procedures-and-routing.md
          test -f .agents/skills/skir-server-development/references/scaffolding.md
          test -f .agents/skills/skir-server-development/references/structures-and-validation.md
          test -f .agents/skills/skir-server-development/references/studio-codecs-and-testing.md
          if [ "${{ matrix.scenario }}" = 'both' ]
          then
            grep -Fq 'php-skir/client' AGENTS.md
            test -f .agents/skills/skir-client-development/SKILL.md
            test -f .agents/skills/skir-client-development/references/generation-and-configuration.md
            test -f .agents/skills/skir-client-development/references/invocation-errors-and-testing.md
            test "$(find .agents/skills -mindepth 1 -maxdepth 1 -type d -name 'skir-*' | wc -l)" -eq 2
          else
            test ! -e .agents/skills/skir-client-development
            test "$(find .agents/skills -mindepth 1 -maxdepth 1 -type d -name 'skir-*' | wc -l)" -eq 1
          fi

  coverage:
    name: Coverage
    needs: tests
    runs-on: ubuntu-latest
    concurrency:
      group: coverage-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Checkout server
        uses: actions/checkout@v7
        with:
          path: server

      - name: Checkout runtime
        uses: actions/checkout@v7
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Checkout client
        uses: actions/checkout@v7
        with:
          repository: php-skir/client
          path: client

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress
        working-directory: server

      - name: Measure coverage
        working-directory: server
        run: |
          mkdir -p build
          vendor/bin/phpunit --coverage-clover=build/coverage.xml --coverage-filter=src
          php -r '$minimum = 80.0; $xml = simplexml_load_file("build/coverage.xml"); $metrics = $xml->project->metrics; $statements = (int) $metrics["statements"]; $covered = (int) $metrics["coveredstatements"]; $percentage = $statements > 0 ? ($covered / $statements) * 100 : 0; file_put_contents("build/coverage-percentage.txt", (string) $percentage); if ($percentage < $minimum) { fwrite(STDERR, sprintf("Statement coverage %.2f%% is below the %.2f%% minimum.\n", $percentage, $minimum)); exit(1); } printf("Statement coverage %.2f%% meets the %.2f%% minimum.\n", $percentage, $minimum);'

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        working-directory: server
        run: node .github/scripts/write-coverage-badge.mjs "$(cat build/coverage-percentage.txt)" build/coverage.svg

      - name: Upload coverage badge
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: |
            server/build/coverage.svg
            server/build/coverage-percentage.txt
          if-no-files-found: error
          retention-days: 1

  publish-coverage-badge:
    name: Publish coverage badge
    if: github.ref == 'refs/heads/main'
    needs: coverage
    runs-on: ubuntu-latest
    concurrency:
      group: coverage-badge
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout server
        uses: actions/checkout@v7
        with:
          path: server

      - name: Download coverage badge
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: server/build

      - name: Publish coverage badge
        working-directory: server
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/publish-coverage-badge.sh build/coverage.svg
