name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.4"
          - "8.5"

    steps:
      - name: Checkout server
        uses: actions/checkout@v7
        with:
          path: server

      - name: Checkout runtime
        uses: actions/checkout@v7
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Checkout client
        uses: actions/checkout@v7
        with:
          repository: php-skir/client
          path: client

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer configuration
        run: composer validate --strict
        working-directory: server

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress
        working-directory: server

      - name: Run tests
        run: composer test
        working-directory: server

  coverage:
    name: Coverage
    needs: tests
    runs-on: ubuntu-latest
    concurrency:
      group: coverage-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Checkout server
        uses: actions/checkout@v7
        with:
          path: server

      - name: Checkout runtime
        uses: actions/checkout@v7
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Checkout client
        uses: actions/checkout@v7
        with:
          repository: php-skir/client
          path: client

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress
        working-directory: server

      - name: Measure coverage
        working-directory: server
        run: |
          mkdir -p build
          vendor/bin/phpunit --coverage-clover=build/coverage.xml --coverage-filter=src
          php -r '$minimum = 80.0; $xml = simplexml_load_file("build/coverage.xml"); $metrics = $xml->project->metrics; $statements = (int) $metrics["statements"]; $covered = (int) $metrics["coveredstatements"]; $percentage = $statements > 0 ? ($covered / $statements) * 100 : 0; file_put_contents("build/coverage-percentage.txt", (string) $percentage); if ($percentage < $minimum) { fwrite(STDERR, sprintf("Statement coverage %.2f%% is below the %.2f%% minimum.\n", $percentage, $minimum)); exit(1); } printf("Statement coverage %.2f%% meets the %.2f%% minimum.\n", $percentage, $minimum);'

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        working-directory: server
        run: node .github/scripts/write-coverage-badge.mjs "$(cat build/coverage-percentage.txt)" build/coverage.svg

      - name: Upload coverage badge
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: |
            server/build/coverage.svg
            server/build/coverage-percentage.txt
          if-no-files-found: error
          retention-days: 1

  publish-coverage-badge:
    name: Publish coverage badge
    if: github.ref == 'refs/heads/main'
    needs: coverage
    runs-on: ubuntu-latest
    concurrency:
      group: coverage-badge
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout server
        uses: actions/checkout@v7
        with:
          path: server

      - name: Download coverage badge
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: server/build

      - name: Publish coverage badge
        working-directory: server
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/publish-coverage-badge.sh build/coverage.svg
